<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Rock Paper Scissors Game</title>
<body>
    <script>
            //randomly return either ‘Rock’, ‘Paper’ or ‘Scissors’
           function computerPlay() {
                const aSelection = ["rock", "paper", "scissors"];
                let randSelection = aSelection[Math.floor(Math.random() * aSelection.length)];
                return randSelection;
           }
           computerPlay();

           //play a round and return a string of text declaring a result
           const playerSelection = window.prompt("Choose your weapon").toLowerCase();
           const computerSelection = computerPlay();
           function playRound(playerSelection, computerSelection) {
               if ((playerSelection === "rock" && computerSelection === "paper") || 
                    (playerSelection === "paper" && computerSelection === "scissors") ||
                    (playerSelection === "scissors" && computerSelection === "rock")) {
                    return alert("You lose! " + computerSelection + " beats " +  playerSelection + "!");
               } else if ((playerSelection === "rock" && computerSelection === "scissors") ||
                    (playerSelection === "paper" && computerSelection === "rock") ||
                    (playerSelection === "scissors" && computerSelection === "paper")) {
                    return alert("You win! " + playerSelection + " beats " + computerSelection + "!");
               }    else {
                       return alert("That's even. " + playerSelection + " is the same as " + computerSelection);
               }
           }
           console.log(playRound(playerSelection, computerSelection));

    </script>
</body>
</head>
</html>
